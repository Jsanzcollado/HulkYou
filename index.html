<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Builder</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f13;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 1rem 1rem 4rem;
    }

    #app { width: 100%; max-width: 600px; }

    /* ── Screens ── */
    .screen { display: none; animation: fadeIn 0.2s ease; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

    /* ── Typography ── */
    h1 { font-size: 1.75rem; font-weight: 800; line-height: 1.2; }
    h2 { font-size: 1.2rem; font-weight: 700; }
    .subtitle { color: #888; font-size: 0.9rem; margin-top: 0.4rem; }

    /* ── Layout helpers ── */
    .stack { display: flex; flex-direction: column; gap: 0.75rem; }
    .row   { display: flex; gap: 0.75rem; }
    .section-gap { margin-top: 2rem; }
    .page-top { padding: 1.75rem 0 1.5rem; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.25rem 0 0.75rem;
    }
    .header h2 { flex: 1; }
    .btn-back {
      background: none;
      border: none;
      color: #888;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem;
    }
    .btn-back:hover { color: #fff; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.12s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary   { background: #6c63ff; color: #fff; }
    .btn-secondary { background: #1e1e2e; color: #ccc; border: 1px solid #2e2e40; }
    .btn-danger    { background: #e53e3e; color: #fff; }
    .btn-primary:hover   { filter: brightness(1.15); }
    .btn-secondary:hover { border-color: #6c63ff; color: #fff; }
    .btn-danger:hover    { filter: brightness(1.15); }
    .btn-sm { width: auto; padding: 0.4rem 0.85rem; font-size: 0.8rem; border-radius: 8px; }

    /* ── Checkbox cards (materials) ── */
    .material-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #1a1a24;
      border: 2px solid #2a2a3a;
      border-radius: 12px;
      padding: 1rem;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .material-card.selected {
      border-color: #6c63ff;
      background: rgba(108, 99, 255, 0.1);
    }
    .material-icon { font-size: 1.4rem; }
    .material-label { font-weight: 500; flex: 1; }
    .check-box {
      width: 22px;
      height: 22px;
      border: 2px solid #444;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
      transition: all 0.12s;
    }
    .material-card.selected .check-box {
      background: #6c63ff;
      border-color: #6c63ff;
      color: #fff;
    }

    /* ── Exercise item (routine view) ── */
    .exercise-item {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 1rem;
    }
    .exercise-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .exercise-name { font-weight: 600; font-size: 0.975rem; }
    .material-tag {
      font-size: 0.7rem;
      background: rgba(108, 99, 255, 0.15);
      color: #a8a3ff;
      padding: 3px 8px;
      border-radius: 99px;
    }
    .exercise-fields {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .field-label {
      font-size: 0.68rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .field-input {
      width: 72px;
      padding: 0.3rem 0.5rem;
      background: #0f0f13;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      color: #f0f0f0;
      font-size: 0.875rem;
      text-align: center;
    }
    .field-input:focus { outline: none; border-color: #6c63ff; }

    /* ── Saved routine card ── */
    .routine-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      gap: 1rem;
    }
    .routine-info { min-width: 0; }
    .routine-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .routine-meta { font-size: 0.78rem; color: #666; margin-top: 2px; }
    .routine-btns { display: flex; gap: 0.5rem; flex-shrink: 0; }

    /* ── Execution screen ── */
    .exec-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.25rem 0 1rem;
    }
    .exec-counter { font-size: 0.875rem; font-weight: 600; color: #888; margin-left: auto; }

    .progress-track {
      height: 5px;
      background: #1e1e2e;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .progress-fill {
      height: 100%;
      background: #6c63ff;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    .phase-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6c63ff;
      background: rgba(108, 99, 255, 0.12);
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 0.75rem;
    }
    .phase-badge.rest { color: #fbbf24; background: rgba(251, 191, 36, 0.12); }

    .exec-exercise-name {
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }

    .timer-display {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      color: #6c63ff;
      font-variant-numeric: tabular-nums;
      margin-bottom: 0.75rem;
    }
    .timer-display.rest { color: #fbbf24; }

    .next-label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 2rem;
    }

    .exec-controls { display: flex; gap: 0.75rem; }
    .btn-stop { max-width: 56px; padding: 0.85rem 0; }

    /* ── Exercise illustration ── */
    .illustration-wrap {
      display: flex;
      justify-content: center;
      margin: 0.25rem 0 1rem;
    }
    #exec-illustration {
      width: 130px;
      height: 95px;
      overflow: visible;
    }

    /* ── Completion overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 19, 0.94);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
      z-index: 50;
    }
    .overlay.show { display: flex; }
    .overlay-emoji { font-size: 4rem; }
    .overlay h2 { font-size: 1.75rem; }
    .overlay p  { color: #888; }

    @media (max-width: 380px) {
      h1 { font-size: 1.4rem; }
      .timer-display { font-size: 4.5rem; }
      .exec-exercise-name { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ════════════ HOME ════════════ -->
  <div id="screen-home" class="screen">
    <div class="page-top">
      <h1>💪 Workout Builder</h1>
      <p class="subtitle">Crea y ejecuta rutinas con el equipo que tienes en casa.</p>
    </div>
    <div class="stack">
      <button class="btn btn-primary"    onclick="goTo('materials')">+ Crear nueva rutina</button>
      <button class="btn btn-secondary"  onclick="scrollToSaved()">Mis rutinas guardadas</button>
    </div>
    <div id="home-saved" class="section-gap"></div>
  </div>

  <!-- ════════════ MATERIALS ════════════ -->
  <div id="screen-materials" class="screen">
    <div class="header">
      <button class="btn-back" onclick="goTo('home')">←</button>
      <h2>¿Con qué entrenas?</h2>
    </div>
    <p class="subtitle" style="margin-bottom:1.25rem;">Selecciona todos los materiales disponibles.</p>
    <div class="stack" id="materials-list"></div>
    <div style="margin-top:1.25rem;">
      <button class="btn btn-primary" onclick="handleGenerate()">Generar rutina →</button>
    </div>
  </div>

  <!-- ════════════ ROUTINE ════════════ -->
  <div id="screen-routine" class="screen">
    <div class="header">
      <button class="btn-back" onclick="goTo('materials')">←</button>
      <h2>Tu rutina</h2>
    </div>
    <div class="stack" id="routine-list"></div>
    <div class="row" style="margin-top:1.25rem;">
      <button class="btn btn-secondary" onclick="saveRoutine()">💾 Guardar</button>
      <button class="btn btn-primary"   onclick="startExecution()">▶ Iniciar</button>
    </div>
  </div>

  <!-- ════════════ EXECUTION ════════════ -->
  <div id="screen-execution" class="screen">
    <div class="exec-header">
      <button class="btn-back" onclick="confirmStop()">←</button>
      <span class="exec-counter" id="exec-counter"></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="exec-progress" style="width:0%"></div>
    </div>
    <div id="exec-phase-badge" class="phase-badge">EJERCICIO</div>
    <div class="exec-exercise-name" id="exec-name"></div>
    <div class="illustration-wrap">
      <svg id="exec-illustration" viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg"
        style="stroke:#a8a3ff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none"></svg>
    </div>
    <div class="timer-display" id="exec-timer">--</div>
    <div class="next-label" id="exec-next"></div>
    <div class="exec-controls">
      <button class="btn btn-secondary" id="btn-pause"  onclick="togglePause()">⏸ Pausar</button>
      <button class="btn btn-primary"                   onclick="nextExercise()">→ Siguiente</button>
      <button class="btn btn-danger btn-stop"           onclick="confirmStop()">✕</button>
    </div>
  </div>

</div>

<!-- Completion overlay -->
<div class="overlay" id="overlay-done">
  <div class="overlay-emoji">🎉</div>
  <h2>¡Rutina completada!</h2>
  <p id="overlay-stats"></p>
  <button class="btn btn-primary" style="max-width:300px; margin-top:0.5rem;" onclick="finishRoutine()">Volver al inicio</button>
</div>

/* Maps exercise name → illustration key (first match wins) */
function getPoseKey(nombre) {
  const n = nombre.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const rules = [
    ['mountain',         'mountain_climber'],
    ['step-up',          'step_up'],
    ['step up',          'step_up'],
    ['burpee',           'burpee'],
    ['superman',         'superman'],
    ['swing',            'swing'],
    ['muerto',           'deadlift'],
    ['tijera',           'jumping_jack'],
    ['zancada',          'lunge'],
    ['plancha',          'plank'],
    ['piernas',          'leg_raise'],
    ['dip',              'dip'],
    ['jalon',            'bent_row'],
    ['remo',             'bent_row'],
    ['curl',             'curl'],
    ['lateral',          'lateral_raise'],
    ['extension',        'tricep_ext'],
    ['tricep',           'tricep_ext'],
    ['press con kettle', 'shoulder_press'],
    ['hombros',          'shoulder_press'],
    ['sentadilla',       'squat'],
    ['goblet',           'squat'],
    ['squat',            'squat'],
    ['flexion',          'push_up'],
    ['press',            'push_up'],
  ];
  for (const [kw, pose] of rules) {
    if (n.includes(kw)) return pose;
  }
  return 'standing';
}

/* ══════════════════════════════════════════
   ROUTING
══════════════════════════════════════════ */
function goTo(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  appState.screen = name;

  const renderers = { home: renderHome, materials: renderMaterials, routine: renderRoutine };
  if (renderers[name]) renderers[name]();
}

/* ══════════════════════════════════════════
   HOME
══════════════════════════════════════════ */
function renderHome() {
  const saved = loadAllRoutines();
  const container = document.getElementById('home-saved');
  if (saved.length === 0) { container.innerHTML = ''; return; }

  const cards = saved.map((r, i) => `
    <div class="routine-card">
      <div class="routine-info">
        <div class="routine-name">${escapeHtml(r.name)}</div>
        <div class="routine-meta">${r.exercises.length} ejercicios · ${r.date}</div>
      </div>
      <div class="routine-btns">
        <button class="btn btn-secondary btn-sm" onclick="loadRoutine(${i})">Cargar</button>
        <button class="btn btn-danger btn-sm"    onclick="deleteRoutine(${i})">✕</button>
      </div>
    </div>`).join('');

  container.innerHTML = `<h2 style="margin-bottom:0.75rem;">Rutinas guardadas</h2><div class="stack">${cards}</div>`;
}

function scrollToSaved() {
  document.getElementById('home-saved').scrollIntoView({ behavior: 'smooth' });
}

/* ══════════════════════════════════════════
   MATERIALS
══════════════════════════════════════════ */
function renderMaterials() {
  document.getElementById('materials-list').innerHTML = MATERIALS_CONFIG.map(m => {
    const sel = appState.selectedMaterials.includes(m.id);
    return `
      <div class="material-card ${sel ? 'selected' : ''}" onclick="toggleMaterial('${m.id}', this)">
        <span class="material-icon">${m.icon}</span>
        <span class="material-label">${m.label}</span>
        <span class="check-box">${sel ? '✓' : ''}</span>
      </div>`;
  }).join('');
}

function toggleMaterial(id, el) {
  const idx = appState.selectedMaterials.indexOf(id);
  const adding = idx === -1;
  if (adding) appState.selectedMaterials.push(id);
  else appState.selectedMaterials.splice(idx, 1);
  el.classList.toggle('selected', adding);
  el.querySelector('.check-box').textContent = adding ? '✓' : '';
}

/* ══════════════════════════════════════════
   ROUTINE GENERATION
══════════════════════════════════════════ */
function generateRoutine(materials) {
  const keys = materials.length > 0 ? materials : ['bodyweight'];
  const pool = keys.flatMap(mat =>
    (EXERCISE_DB[mat] || []).map(ex => ({ ...ex, material: mat }))
  );
  const count = Math.min(pool.length, 4 + Math.floor(Math.random() * 3)); // 4–6
  return shuffle(pool).slice(0, count);
}

function handleGenerate() {
  if (appState.selectedMaterials.length === 0) {
    alert('Selecciona al menos un material.');
    return;
  }
  appState.currentRoutine = generateRoutine(appState.selectedMaterials);
  goTo('routine');
}

/* ══════════════════════════════════════════
   ROUTINE VIEW
══════════════════════════════════════════ */
function renderRoutine() {
  document.getElementById('routine-list').innerHTML =
    appState.currentRoutine.length === 0
      ? '<p style="color:#666; text-align:center; padding:2rem 0;">Rutina vacía. Vuelve y genera una nueva.</p>'
      : appState.currentRoutine.map((ex, i) => `
          <div class="exercise-item">
            <div class="exercise-row-top">
              <span class="exercise-name">${escapeHtml(ex.nombre)}</span>
              <span class="material-tag">${ex.material}</span>
            </div>
            <div class="exercise-fields">
              <div class="field">
                <span class="field-label">Duración (s)</span>
                <input class="field-input" type="number" min="5" max="300" value="${ex.duracionSegundos}"
                  onchange="updateField(${i}, 'duracionSegundos', this.value)" />
              </div>
              <div class="field">
                <span class="field-label">Descanso (s)</span>
                <input class="field-input" type="number" min="0" max="120" value="${ex.descansoSegundos}"
                  onchange="updateField(${i}, 'descansoSegundos', this.value)" />
              </div>
              <button class="btn btn-danger btn-sm" style="margin-top:auto;"
                onclick="removeExercise(${i})">✕</button>
            </div>
          </div>`).join('');
}

function updateField(index, field, value) {
  appState.currentRoutine[index][field] = Math.max(0, parseInt(value, 10) || 0);
}

function removeExercise(index) {
  appState.currentRoutine.splice(index, 1);
  renderRoutine();
}

/* ══════════════════════════════════════════
   SAVE / LOAD / DELETE
══════════════════════════════════════════ */
function saveRoutine() {
  if (appState.currentRoutine.length === 0) { alert('La rutina está vacía.'); return; }
  const name = prompt('Nombre de la rutina:', `Rutina ${new Date().toLocaleDateString('es-ES')}`);
  if (name === null) return;
  const all = loadAllRoutines();
  all.push({ name: name.trim() || 'Sin nombre', date: new Date().toLocaleDateString('es-ES'), exercises: appState.currentRoutine });
  localStorage.setItem('workoutRoutines', JSON.stringify(all));
  alert('✅ Rutina guardada.');
}

function loadAllRoutines() {
  try { return JSON.parse(localStorage.getItem('workoutRoutines') || '[]'); }
  catch { return []; }
}

function loadRoutine(index) {
  const all = loadAllRoutines();
  appState.currentRoutine = structuredClone ? structuredClone(all[index].exercises) : JSON.parse(JSON.stringify(all[index].exercises));
  goTo('routine');
}

function deleteRoutine(index) {
  if (!confirm('¿Eliminar esta rutina?')) return;
  const all = loadAllRoutines();
  all.splice(index, 1);
  localStorage.setItem('workoutRoutines', JSON.stringify(all));
  renderHome();
}

/* ══════════════════════════════════════════
   EXECUTION
══════════════════════════════════════════ */
function startExecution() {
  if (appState.currentRoutine.length === 0) { alert('La rutina está vacía.'); return; }
  const t = appState.timer;
  clearInterval(t.intervalId);
  t.exerciseIndex = 0;
  t.phase = 'exercise';
  t.paused = false;
  t.startTime = Date.now();

  goTo('execution');
  loadCurrentExercise();
  t.intervalId = setInterval(tick, 1000);
}

function loadCurrentExercise() {
  const t = appState.timer;
  t.phase = 'exercise';
  t.countdown = appState.currentRoutine[t.exerciseIndex].duracionSegundos;
  refreshExecutionUI();
}

function tick() {
  const t = appState.timer;
  if (t.paused) return;

  t.countdown--;
  if (t.countdown > 0) { refreshExecutionUI(); return; }

  const ex = appState.currentRoutine[t.exerciseIndex];
  if (t.phase === 'exercise' && ex.descansoSegundos > 0) {
    t.phase = 'rest';
    t.countdown = ex.descansoSegundos;
    refreshExecutionUI();
  } else {
    nextExercise();
  }
}

function nextExercise() {
  const t = appState.timer;
  t.exerciseIndex++;
  if (t.exerciseIndex >= appState.currentRoutine.length) {
    finishExecution();
  } else {
    loadCurrentExercise();
  }
}

function refreshExecutionUI() {
  const t = appState.timer;
  const routine = appState.currentRoutine;
  const total   = routine.length;
  const isRest  = t.phase === 'rest';
  const current = routine[t.exerciseIndex];
  const next    = routine[t.exerciseIndex + 1];

  document.getElementById('exec-counter').textContent = `${t.exerciseIndex + 1} / ${total}`;

  const badge = document.getElementById('exec-phase-badge');
  badge.textContent = isRest ? 'DESCANSO' : 'EJERCICIO';
  badge.className   = 'phase-badge' + (isRest ? ' rest' : '');

  document.getElementById('exec-name').textContent = current.nombre;

  // Illustration: keep the same pose during rest (shows what's coming next)
  const poseKey = getPoseKey(current.nombre);
  document.getElementById('exec-illustration').innerHTML =
    ILLUSTRATIONS[poseKey] || ILLUSTRATIONS.standing;

  const timerEl = document.getElementById('exec-timer');
  timerEl.textContent = t.countdown;
  timerEl.className   = 'timer-display' + (isRest ? ' rest' : '');

  document.getElementById('exec-next').textContent = next
    ? `Siguiente: ${next.nombre}`
    : 'Último ejercicio';

  document.getElementById('exec-progress').style.width =
    `${(t.exerciseIndex / total) * 100}%`;
}

function togglePause() {
  const t = appState.timer;
  t.paused = !t.paused;
  document.getElementById('btn-pause').textContent = t.paused ? '▶ Reanudar' : '⏸ Pausar';
}

function confirmStop() {
  if (confirm('¿Salir del entrenamiento?')) {
    stopTimer();
    goTo('home');
  }
}

function stopTimer() {
  clearInterval(appState.timer.intervalId);
  appState.timer.intervalId = null;
}

function finishExecution() {
  stopTimer();
  const elapsed = Math.round((Date.now() - appState.timer.startTime) / 60000);
  document.getElementById('overlay-stats').textContent =
    `${appState.currentRoutine.length} ejercicios completados · ${elapsed || 1} min`;
  document.getElementById('overlay-done').classList.add('show');
}

function finishRoutine() {
  document.getElementById('overlay-done').classList.remove('show');
  goTo('home');
}

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
goTo('home');
</script>
